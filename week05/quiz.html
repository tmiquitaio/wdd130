<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gospel Library Study Quiz</title>
    <link rel="stylesheet" href="styles/quiz.css">
</head>

<body>

    <main>
        <h1>Gospel Library Study Quiz</h1>

        <form>

            <div class="form-item">
                <label for="q1">
                    1. What is the name of the app that provides access to scriptures, General
                    Conference talks, and Church manuals?
                </label>
                <input type="text" id="q1" name="q1">
            </div>

            <div class="form-item">
                <label for="q2">
                    2. Briefly explain how you use the Gospel Library app in your personal scripture
                    study.
                </label>
                <textarea id="q2" name="q2" rows="4"></textarea>
            </div>

            <div class="form-item">
                <label for="q3">
                    3. Which of the following resources can be found in Gospel Library?
                </label>
                <select id="q3" name="q3">
                    <option value="" selected disabled>Select an Answer</option>
                    <option value="scriptures">The Scriptures</option>
                    <option value="conference">General Conference Messages</option>
                    <option value="manuals">Church Manuals</option>
                    <option value="all">All of the Above</option>
                </select>
            </div>

            <div class="form-item">
                <label for="q4">
                    4. How many books are included in the Book of Mormon?
                </label>
                <input type="number" id="q4" name="q4" min="1" max="50">
            </div>

            <button type="submit">Submit Quiz</button>

        </form>
    </main>

</body>

</html>
